version: "3.3"
services:
  nginx:
    build: ./docker/nginx
    container_name: globo-nginx
    privileged: true
    ports:
      - 8181:80
      - 8282:443
    networks:
      - default
      - globo-gateway
    volumes:
      - ./:/app
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/certificate.crt:/etc/nginx/conf.d/certificate.crt
      - ./docker/nginx/certificate.key:/etc/nginx/conf.d/certificate.key
      - ./docker/nginx/logs:/var/log/nginx

  php:
    build: ./docker/php
    container_name: globo-php
    privileged: true
    networks:
      - default
      - globo-gateway
    volumes:
      - ./:/app
      - ./docker/php/config:/usr/local/etc/php
      - ./docker/php/logs/newrelic:/var/log/newrelic
      - ./docker/php/logs/php:/var/log/php
    environment:
      PHP_IDE_CONFIG: serverName=docker
      XDEBUG_CONFIG: idekey=globo

  cron:
    build: ./docker/cron
    container_name: globo-cron
    privileged: true
    networks:
      - default
      - globo-gateway
    volumes:
      - ./:/app
      - ./docker/cron/logs:/var/log/cron

  redis:
    build: ./docker/redis
    container_name: globo-redis
    privileged: true
    ports:
      - 6379:6379
    deploy:
      resources:
        limits:
          memory: 2g

  elk:
    build: ./docker/elk
    container_name: globo-elk
    ports:
      - 5601:5601
      - 9200:9200
    environment:
      LOGSTASH_START: 0
      ES_JAVA_OPTS: "-Xmx256m -Xms256m"
    volumes:
      - ./docker/elk/logs:/var/log/elasticsearch
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 2g

